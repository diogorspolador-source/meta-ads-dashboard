<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads · Método Prepara</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --brand:    #E8500A;
  --brand2:   #c43d00;
  --brand3:   #ff7240;
  --glow:     rgba(232,80,10,0.18);
  --glow2:    rgba(232,80,10,0.10);
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --bg3:      #181818;
  --surface:  rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(232,80,10,0.28);
  --text:     #f5f5f5;
  --text2:    #888;
  --text3:    #444;
  --green:    #22c55e;
  --green-lt: rgba(34,197,94,0.10);
  --red:      #ef4444;
  --red-lt:   rgba(239,68,68,0.10);
  --yellow:   #f59e0b;
  --yellow-lt:rgba(245,158,11,0.10);
  --r:        10px;
  --r-sm:     7px;
  --sidebar-w:220px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.7s ease,visibility 0.7s ease}
#splash.out{opacity:0;visibility:hidden;pointer-events:none}
.splash-logo{display:flex;flex-direction:column;align-items:center;gap:10px;animation:splashIn 0.9s cubic-bezier(0.16,1,0.3,1) both}
.splash-mark{width:68px;height:68px;border-radius:18px;background:var(--brand);display:flex;align-items:center;justify-content:center;box-shadow:0 0 60px var(--glow),0 0 120px rgba(232,80,10,0.06);margin-bottom:6px}
.splash-mark svg{width:36px;height:36px}
.splash-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,8vw,70px);letter-spacing:8px;color:#fff;text-align:center;line-height:1}
.splash-sub{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:#333;text-align:center;margin-top:2px}
.splash-bar{width:100px;height:2px;background:#1a1a1a;border-radius:2px;margin-top:32px;overflow:hidden}
.splash-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--brand),var(--brand3));border-radius:2px;animation:barLoad 1.8s cubic-bezier(0.16,1,0.3,1) 0.3s both}
@keyframes barLoad{from{width:0}to{width:100%}}
@keyframes splashIn{from{opacity:0;transform:translateY(22px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}

/* SIDEBAR */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;border-radius:8px;background:var(--brand);display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px var(--glow);flex-shrink:0}
.logo-mark svg{width:17px;height:17px}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2.5px;color:var(--text);line-height:1}
.logo-sub{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:2px}
.sidebar-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px}
.nav-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:12px 8px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.15s;border:none;background:transparent;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:rgba(232,80,10,0.10);color:var(--text)}
.nav-item.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--brand);border-radius:2px}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;opacity:0.6}
.nav-item.active .nav-icon{opacity:1}
.sidebar-foot{padding:12px;border-top:1px solid var(--border)}
.refresh-badge{display:flex;align-items:center;gap:7px;padding:8px 11px;border-radius:var(--r-sm);background:var(--surface);font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* MAIN */
.main{margin-left:var(--sidebar-w);min-height:100vh;position:relative;z-index:1}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:52px;background:rgba(10,10,10,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40;gap:10px;flex-wrap:wrap}
.breadcrumb{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;flex-shrink:0}
.bc-item{color:var(--text3);cursor:pointer;transition:color 0.15s}
.bc-item:hover{color:var(--brand)}
.bc-item.active{color:var(--text);cursor:default}
.bc-sep{color:var(--text3)}
.topbar-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.period-group{display:flex;gap:1px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:2px}
.period-btn{padding:4px 11px;border-radius:5px;font-size:11px;font-weight:700;color:var(--text3);background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:0.3px;transition:all 0.12s}
.period-btn:hover{color:var(--text)}
.period-btn.active{background:var(--brand);color:#fff}
.custom-picker{display:none;align-items:center;gap:7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:4px 10px}
.custom-picker label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.5px}
.custom-picker input[type=date]{border:1px solid var(--border);border-radius:5px;background:var(--bg2);font-family:'DM Mono',monospace;font-size:11px;color:var(--text);outline:none;padding:3px 7px;cursor:pointer;color-scheme:dark}
.custom-picker input[type=date]:focus{border-color:var(--brand)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all 0.15s}
.btn-outline{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--brand);color:var(--brand)}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand2)}
.btn-sm{padding:3px 9px;font-size:11px}

/* CONTENT */
.content{padding:20px 22px;max-width:1440px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:16px}
@media(max-width:1200px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:15px 17px;transition:all 0.2s;animation:fadeUp 0.5s ease both;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--brand);opacity:0;transition:opacity 0.2s}
.kpi:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-2px)}
.kpi:hover::after{opacity:1}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.kpi-icon{font-size:15px;margin-bottom:9px;opacity:0.65}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.kpi-val{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);letter-spacing:1px;line-height:1}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:5px;font-family:'DM Mono',monospace}
.kpi-delta{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;margin-top:7px;padding:2px 7px;border-radius:20px}
.delta-up{background:var(--green-lt);color:var(--green)}
.delta-down{background:var(--red-lt);color:var(--red)}
.delta-flat{background:var(--surface);color:var(--text3)}

/* GRID */
.grid-2{display:grid;grid-template-columns:1.6fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:960px){.grid-2{grid-template-columns:1fr}}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;animation:fadeUp 0.4s ease both}
.card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 17px;border-bottom:1px solid var(--border)}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--text)}
.card-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.chart-wrap{padding:14px 17px 8px}
.chart-area{width:100%;height:180px}

/* METRIC TABS */
.metric-tabs{display:flex;gap:1px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:2px}
.metric-tab{padding:4px 11px;border-radius:5px;font-size:11px;font-weight:600;color:var(--text3);background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s}
.metric-tab:hover{color:var(--text)}
.metric-tab.active{background:var(--brand);color:#fff}

/* BARS */
.bars{padding:12px 17px 14px;display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:9px}
.bar-label{font-size:11px;font-weight:500;color:var(--text2);width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--brand),var(--brand3));transition:width 1s cubic-bezier(0.16,1,0.3,1)}
.bar-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);width:80px;text-align:right;flex-shrink:0}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:1px solid var(--border)}
th{padding:9px 12px;text-align:left;font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--text3);white-space:nowrap;cursor:pointer;user-select:none;transition:color 0.12s;background:var(--bg)}
th:hover{color:var(--brand)}
th.sorted{color:var(--brand)}
td{padding:10px 12px;font-size:12px;font-weight:500;border-bottom:1px solid rgba(255,255,255,0.04);white-space:nowrap;transition:background 0.12s}
tr:last-child td{border-bottom:none}
tr:nth-child(even) td{background:rgba(255,255,255,0.015)}
tr:hover td{background:rgba(232,80,10,0.04)!important}
.mono{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.name-cell{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{display:inline-flex;align-items:center;font-size:8px;font-weight:800;padding:2px 7px;border-radius:20px;letter-spacing:.8px;text-transform:uppercase}
.pill-green{background:var(--green-lt);color:var(--green)}
.pill-yellow{background:var(--yellow-lt);color:var(--yellow)}
.pill-red{background:var(--red-lt);color:var(--red)}
.pill-gray{background:var(--surface2);color:var(--text3)}
.pill-blue{background:rgba(232,80,10,0.12);color:var(--brand3)}
.sort-icon{margin-left:2px;opacity:0.4;font-size:9px}
th.sorted .sort-icon{opacity:1}
.drill{background:rgba(232,80,10,0.08);border:1px solid rgba(232,80,10,0.2);color:var(--brand3);padding:4px 9px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.3px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.12s}
.drill:hover{background:var(--brand);color:#fff;border-color:var(--brand)}

/* AD GRID */
.ad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;padding:14px 17px}
.ad-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all 0.2s;position:relative;animation:fadeUp 0.4s ease both}
.ad-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 10px 30px rgba(232,80,10,0.08)}
.ad-thumb{width:100%;aspect-ratio:1.91/1;background:var(--bg);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.ad-thumb-bg{width:100%;height:100%;background-size:cover;background-position:center;transition:transform 0.3s}
.ad-card:hover .ad-thumb-bg{transform:scale(1.04)}
.ad-thumb-empty{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:22px}
.ad-thumb-empty span{font-size:10px;color:var(--text3)}
.ad-rank{position:absolute;top:7px;left:7px;z-index:2;background:var(--brand);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:1px;padding:3px 10px;border-radius:20px;box-shadow:0 2px 10px rgba(232,80,10,0.4)}
.ad-info{padding:10px 12px;background:var(--bg2)}
.ad-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ad-stats{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.ad-stat{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 8px}
.ad-stat-label{font-size:8px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);margin-bottom:2px}
.ad-stat-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text)}
.ad-stat.primary{border-color:rgba(232,80,10,0.25);background:rgba(232,80,10,0.06)}
.ad-stat.primary .ad-stat-val{color:var(--brand3)}

/* STATES */
.state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:10px}
.state-icon{font-size:28px}
.state-title{font-size:14px;font-weight:600;color:var(--text2)}
.state-sub{font-size:12px;color:var(--text3)}
.spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-bar{background:var(--red-lt);border:1px solid rgba(239,68,68,0.25);border-radius:var(--r);padding:11px 15px;color:var(--red);font-size:12px;font-weight:600;margin-bottom:14px}
.period-label-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(232,80,10,0.08);border:1px solid rgba(232,80,10,0.18);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--brand3);margin-bottom:14px;font-family:'DM Mono',monospace}

/* STAGGER */
.kpi:nth-child(1){animation-delay:.02s}.kpi:nth-child(2){animation-delay:.05s}.kpi:nth-child(3){animation-delay:.08s}
.kpi:nth-child(4){animation-delay:.11s}.kpi:nth-child(5){animation-delay:.14s}.kpi:nth-child(6){animation-delay:.17s}
.ad-card:nth-child(1){animation-delay:.03s}.ad-card:nth-child(2){animation-delay:.06s}.ad-card:nth-child(3){animation-delay:.09s}
.ad-card:nth-child(4){animation-delay:.12s}.ad-card:nth-child(5){animation-delay:.15s}.ad-card:nth-child(6){animation-delay:.18s}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">
    <div class="splash-mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 17V8l5 6 5-6v9" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="splash-name">MÉTODO PREPARA</div>
    <div class="splash-sub">Meta Ads Dashboard</div>
    <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-row">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5 17V8l5 6 5-6v9" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">PREPARA</div>
        <div class="logo-sub">Meta Ads</div>
      </div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Navegação</div>
    <button class="nav-item active" onclick="setView('overview')" id="nav-overview">
      <span class="nav-icon">⬡</span> Visão Geral
    </button>
    <button class="nav-item" onclick="setView('campaigns')" id="nav-campaigns">
      <span class="nav-icon">◈</span> Campanhas
    </button>
    <button class="nav-item" onclick="setView('ads')" id="nav-ads">
      <span class="nav-icon">◰</span> Criativos
    </button>
  </nav>
  <div class="sidebar-foot">
    <div class="refresh-badge">
      <div class="live-dot"></div>
      <span id="last-update">—</span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">
      <span class="bc-item active">Visão Geral</span>
    </div>
    <div class="topbar-right">
      <div class="period-group">
        <button class="period-btn" data-days="7">7d</button>
        <button class="period-btn active" data-days="14">14d</button>
        <button class="period-btn" data-days="30">30d</button>
        <button class="period-btn" data-days="60">60d</button>
        <button class="period-btn" data-days="90">90d</button>
        <button class="period-btn" data-days="custom">Custom</button>
      </div>
      <div class="custom-picker" id="custom-picker">
        <label>DE</label><input type="date" id="date-since">
        <label>ATÉ</label><input type="date" id="date-until">
        <button class="btn btn-primary btn-sm" onclick="applyCustomPeriod()">Aplicar</button>
      </div>
      <button class="btn btn-outline" onclick="loadAll()">↺ Atualizar</button>
    </div>
  </div>

  <div class="content" id="page-content">
    <div class="state"><div class="spinner"></div><div class="state-sub">Inicializando...</div></div>
  </div>
</main>

<script>
// SPLASH
window.addEventListener('load', () => {
  setTimeout(() => document.getElementById('splash').classList.add('out'), 2200);
});

const S = {
  period:14, customSince:null, customUntil:null,
  view:'overview', campaigns:[], allInsights:[], prevInsights:[],
  campaignInsights:{}, prevCampaignInsights:{}, daily:[],
  ads:[], adInsights:{},
  selectedCampaign:null, selectedCampaignName:null, selectedCampaignObjective:null,
  sortCol:'spend', sortDir:'desc', chartMetric:'spend', loading:false,
};

const API = '/api/meta';

function getDates(days, offset=0) {
  if (S.customSince && S.customUntil && offset===0) return {since:S.customSince, until:S.customUntil};
  const until = new Date();
  until.setDate(until.getDate() - offset*days);
  const since = new Date(until);
  since.setDate(since.getDate() - days);
  if (offset>0) until.setDate(until.getDate()-1);
  const fmt = d => d.toISOString().split('T')[0];
  return {since:fmt(since), until:fmt(until)};
}

async function apiFetch(endpoint, extra={}) {
  const dates = extra.since ? {since:extra.since, until:extra.until} : getDates(S.period);
  const p = new URLSearchParams({endpoint, ...dates, ...extra});
  const res = await fetch(`${API}?${p}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

async function apiFetchPrev(endpoint, extra={}) {
  const {since, until} = getDates(S.period, 1);
  const p = new URLSearchParams({endpoint, since, until, ...extra});
  const res = await fetch(`${API}?${p}`);
  const json = await res.json();
  if (json.error) return {data:[]};
  return json;
}

async function loadAll() {
  if (S.loading) return;
  S.loading = true; showLoading();
  try {
    const [campData, insData, insDataPrev, dailyData] = await Promise.all([
      apiFetch('campaigns'),
      apiFetch('all_campaigns_insights'),
      apiFetchPrev('all_campaigns_insights'),
      apiFetch('daily'),
    ]);
    S.campaigns = campData.data||[];
    S.allInsights = insData.data||[];
    S.prevInsights = insDataPrev.data||[];
    S.campaignInsights = {}; S.allInsights.forEach(i=>{S.campaignInsights[i.campaign_id]=i});
    S.prevCampaignInsights = {}; S.prevInsights.forEach(i=>{S.prevCampaignInsights[i.campaign_id]=i});
    S.daily = (dailyData.data||[]).sort((a,b)=>a.date_start.localeCompare(b.date_start));
    S.loading = false;
    updateLastUpdate();
    renderView();
  } catch(err) {
    S.loading = false;
    showError(err.message);
  }
}

async function loadAds(campaignId) {
  showLoading();
  try {
    const adsData = await apiFetch('ads', {id:campaignId});
    const ads = adsData.data||[];
    const insResults = await Promise.all(
      ads.map(ad => apiFetch('ad_insights', {id:ad.id})
        .then(r=>({id:ad.id, ins:r.data?.[0]||{}}))
        .catch(()=>({id:ad.id, ins:{}})))
    );
    S.adInsights = {};
    insResults.forEach(r=>{S.adInsights[r.id]=r.ins});
    S.ads = ads;
    renderView();
  } catch(err) { showError(err.message); }
}

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if (btn.dataset.days==='custom') {
      const picker = document.getElementById('custom-picker');
      picker.style.display = 'flex';
      const {since, until} = getDates(S.period);
      document.getElementById('date-since').value = S.customSince||since;
      document.getElementById('date-until').value = S.customUntil||until;
    } else {
      document.getElementById('custom-picker').style.display = 'none';
      S.period = parseInt(btn.dataset.days);
      S.customSince = null; S.customUntil = null;
      loadAll();
    }
  });
});

function applyCustomPeriod() {
  const since = document.getElementById('date-since').value;
  const until = document.getElementById('date-until').value;
  if (!since||!until) {alert('Preencha as duas datas.');return}
  if (since>until) {alert('Data inicial não pode ser maior que a final.');return}
  S.period = Math.round((new Date(until)-new Date(since))/(1000*60*60*24))+1||1;
  S.customSince=since; S.customUntil=until;
  loadAll();
}

function setView(view, campaignId, campaignName, campaignObjective) {
  S.view = view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(view==='campaign-detail'?'nav-ads':'nav-'+view)?.classList.add('active');
  if (view==='campaign-detail') {
    S.selectedCampaign=campaignId; S.selectedCampaignName=campaignName; S.selectedCampaignObjective=campaignObjective;
    loadAds(campaignId); updateBreadcrumb(); return;
  }
  renderView();
}

function renderView() {
  updateBreadcrumb();
  const el = document.getElementById('page-content');
  if (S.view==='overview') el.innerHTML = renderOverview();
  else if (S.view==='campaigns') el.innerHTML = renderCampaignsView();
  else if (S.view==='ads') el.innerHTML = renderAdsView();
  else if (S.view==='campaign-detail') el.innerHTML = renderCampaignDetail();
  bindChartTabs(); animateBars();
}

function periodLabel() {
  if (S.customSince&&S.customUntil) return `${S.customSince} → ${S.customUntil}`;
  return `últimos ${S.period} dias`;
}

function agg(items) {
  let spend=0,impressions=0,clicks=0,reach=0,results=0,ctrSum=0,cpcSum=0,cpmSum=0,freq=0,n=0;
  items.forEach(ins=>{
    spend+=parseFloat(ins.spend||0); impressions+=parseInt(ins.impressions||0);
    clicks+=parseInt(ins.clicks||0); reach+=parseInt(ins.reach||0);
    results+=getResults(ins); ctrSum+=parseFloat(ins.ctr||0);
    cpcSum+=parseFloat(ins.cpc||0); cpmSum+=parseFloat(ins.cpm||0);
    freq+=parseFloat(ins.frequency||0); n++;
  });
  return {spend,impressions,clicks,reach,results,
    ctr:n?ctrSum/n:0, cpc:n?cpcSum/n:0, cpm:n?cpmSum/n:0, frequency:n?freq/n:0, n};
}

function getResults(ins) {
  if (!ins.actions) return 0;
  const prio=['offsite_conversion.fb_pixel_purchase','lead','offsite_conversion.fb_pixel_lead','link_click'];
  for (const k of prio) { const f=ins.actions.find(a=>a.action_type===k); if(f) return parseInt(f.value||0); }
  return ins.actions.reduce((s,a)=>s+parseInt(a.value||0),0);
}

function getResultType(objective) {
  const obj=(objective||'').toUpperCase();
  if (obj.includes('SALES')||obj.includes('CONVERSIONS')||obj==='OUTCOME_SALES') return 'sales';
  if (obj.includes('LEADS')||obj.includes('LEAD')||obj==='OUTCOME_LEADS') return 'leads';
  return 'results';
}

function getResultLabel(objective) {
  const t=getResultType(objective);
  if (t==='sales') return 'Vendas';
  if (t==='leads') return 'Leads';
  return 'Resultados';
}

function getResultsFromIns(ins, objective) {
  if (!ins.actions) return 0;
  const type=getResultType(objective||'');
  if (type==='sales') { const p=ins.actions.find(a=>a.action_type==='offsite_conversion.fb_pixel_purchase'); if(p) return parseInt(p.value||0); }
  if (type==='leads') { const l=ins.actions.find(a=>a.action_type==='lead'||a.action_type==='offsite_conversion.fb_pixel_lead'); if(l) return parseInt(l.value||0); }
  const purchase=ins.actions.find(a=>a.action_type==='offsite_conversion.fb_pixel_purchase');
  if (purchase) return parseInt(purchase.value||0);
  const lead=ins.actions.find(a=>a.action_type==='lead'||a.action_type==='offsite_conversion.fb_pixel_lead');
  if (lead) return parseInt(lead.value||0);
  return ins.actions.reduce((s,a)=>s+parseInt(a.value||0),0);
}

function delta(curr,prev) { if(!prev||prev===0) return null; return ((curr-prev)/prev)*100; }

function deltaHTML(curr,prev,invert=false) {
  const d=delta(curr,prev); if(d===null) return '';
  const isGood=invert?d<0:d>0;
  const cls=Math.abs(d)<0.5?'delta-flat':isGood?'delta-up':'delta-down';
  const arrow=Math.abs(d)<0.5?'→':d>0?'↑':'↓';
  return `<span class="kpi-delta ${cls}">${arrow} ${d>0?'+':''}${d.toFixed(1)}%</span>`;
}

function renderKPIs(curr,prev) {
  const kpis=[
    {icon:'💸',label:'Gasto Total',   val:fmtR(curr.spend),           sub:`${S.allInsights.length} camp. ativas`, d:deltaHTML(curr.spend,prev.spend)},
    {icon:'👁', label:'Impressões',   val:fmtNShort(curr.impressions), sub:`CPM: ${fmtR(curr.cpm)}`,              d:deltaHTML(curr.impressions,prev.impressions)},
    {icon:'🖱', label:'Cliques',      val:fmtNShort(curr.clicks),      sub:`CTR: ${curr.ctr.toFixed(2)}%`,        d:deltaHTML(curr.clicks,prev.clicks)},
    {icon:'📡', label:'Alcance',      val:fmtNShort(curr.reach),       sub:`Freq: ${curr.frequency.toFixed(2)}`,  d:deltaHTML(curr.reach,prev.reach)},
    {icon:'💰', label:'CPC Médio',    val:fmtR(curr.cpc),              sub:'por clique',                          d:deltaHTML(curr.cpc,prev.cpc,true)},
    {icon:'🎯', label:'Resultados',   val:fmtNShort(curr.results),     sub:curr.results>0?`CPR: ${fmtR(curr.spend/curr.results)}`:'—', d:deltaHTML(curr.results,prev.results)},
  ];
  return `<div class="kpi-row">${kpis.map((k,i)=>`
    <div class="kpi" style="animation-delay:${i*0.04}s">
      <div class="kpi-icon">${k.icon}</div>
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-sub">${k.sub}</div>
      ${k.d||''}
    </div>`).join('')}</div>`;
}

function renderLineChart() {
  const data=S.daily;
  if (!data.length) return '<div class="state"><div class="state-sub">Sem dados diários</div></div>';
  const metric=S.chartMetric;
  const vals=data.map(d=>{
    if(metric==='spend') return parseFloat(d.spend||0);
    if(metric==='clicks') return parseInt(d.clicks||0);
    if(metric==='impressions') return parseInt(d.impressions||0);
    if(metric==='ctr') return parseFloat(d.ctr||0);
    return 0;
  });
  const W=600,H=160,P={top:12,right:12,bottom:28,left:52};
  const cW=W-P.left-P.right,cH=H-P.top-P.bottom;
  const maxV=Math.max(...vals)||1, minV=Math.min(...vals);
  const xStep=cW/Math.max(vals.length-1,1);
  const yScale=v=>cH-((v-minV)/(maxV-minV||1))*cH;
  const pts=vals.map((v,i)=>`${P.left+i*xStep},${P.top+yScale(v)}`);
  const area=`${P.left},${P.top+cH} ${pts.join(' ')} ${P.left+(vals.length-1)*xStep},${P.top+cH}`;
  const yTicks=[0,.33,.66,1].map(t=>{
    const v=minV+(maxV-minV)*t, y=P.top+cH-t*cH;
    const lb=metric==='spend'?fmtR(v):metric==='ctr'?v.toFixed(2)+'%':fmtNShort(v);
    return `<text x="${P.left-6}" y="${y+4}" text-anchor="end" fill="#444" font-size="9" font-family="DM Mono,monospace">${lb}</text>
      <line x1="${P.left}" y1="${y}" x2="${P.left+cW}" y2="${y}" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>`;
  }).join('');
  const step=Math.max(1,Math.floor(data.length/6));
  const xLabels=data.map((d,i)=>i%step!==0&&i!==data.length-1?'':
    `<text x="${P.left+i*xStep}" y="${H-2}" text-anchor="middle" fill="#444" font-size="9">${d.date_start.slice(5)}</text>`).join('');
  const dots=pts.map((p,i)=>{const[px,py]=p.split(',');return`<circle cx="${px}" cy="${py}" r="${i===vals.length-1?4:2}" fill="${i===vals.length-1?'#ff7240':'#E8500A'}" stroke="rgba(0,0,0,0.4)" stroke-width="1.5" opacity="${i===vals.length-1?1:0.75}"/>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-area" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <linearGradient id="aG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#E8500A" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#E8500A" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="lineG" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#E8500A"/>
        <stop offset="100%" stop-color="#ff7240"/>
      </linearGradient>
    </defs>
    ${yTicks}
    <polygon points="${area}" fill="url(#aG)"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="url(#lineG)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${xLabels}
  </svg>`;
}

function bindChartTabs() {
  document.querySelectorAll('.metric-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.metric-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      S.chartMetric=btn.dataset.metric;
      const wrap=document.querySelector('.chart-wrap');
      if(wrap) wrap.innerHTML=renderLineChart();
      bindChartTabs();
    });

function renderBarChart() {
  const sorted=[...S.allInsights].sort((a,b)=>parseFloat(b.spend||0)-parseFloat(a.spend||0)).slice(0,8);
  if(!sorted.length) return '<div class="state"><div class="state-sub">Sem dados</div></div>';
  const max=parseFloat(sorted[0].spend||1);
  return `<div class="bars">${sorted.map(ins=>`
    <div class="bar-row">
      <span class="bar-label" title="${esc(ins.campaign_name)}">${esc(ins.campaign_name)}</span>
      <div class="bar-track"><div class="bar-fill" data-pct="${(parseFloat(ins.spend||0)/max*100).toFixed(1)}" style="width:0%"></div></div>
      <span class="bar-val">${fmtR(ins.spend)}</span>
    </div>`).join('')}</div>`;
}

function animateBars() {
  setTimeout(()=>{
    document.querySelectorAll('.bar-fill[data-pct]').forEach(el=>{el.style.width=el.dataset.pct+'%'});
  },80);
}

function renderCampaignTable(compact=false) {
  const rows=S.allInsights.map(ins=>{
    const camp=S.campaigns.find(c=>c.id===ins.campaign_id)||{};
    return {...camp,ins};
  });
  const sorted=[...rows].sort((a,b)=>{
    let va,vb;
    if(S.sortCol==='results'){
      va=getResultsFromIns(a.ins||{},a.objective||'');
      vb=getResultsFromIns(b.ins||{},b.objective||'');
    } else {
      va=parseFloat(a.ins?.[S.sortCol]||0);
      vb=parseFloat(b.ins?.[S.sortCol]||0);
    }
    return S.sortDir==='desc'?vb-va:va-vb;
  });
  const display=compact?sorted.slice(0,8):sorted;
  if(!display.length) return '<div class="state"><div class="state-icon">◌</div><div class="state-sub">Nenhuma campanha com dados no período</div></div>';

  const cols=[
    {key:'name',label:'Campanha',sort:false},
    {key:'status',label:'Status',sort:false},
    {key:'spend',label:'Gasto',sort:true},
    {key:'impressions',label:'Impressões',sort:true},
    {key:'clicks',label:'Cliques',sort:true},
    {key:'ctr',label:'CTR',sort:true},
    {key:'cpc',label:'CPC',sort:true},
    {key:'cpm',label:'CPM',sort:true},
    {key:'reach',label:'Alcance',sort:true},
    {key:'results',label:'Resultado',sort:true},
    {key:'action',label:'',sort:false},
  ];
  const ths=cols.map(c=>`<th class="${S.sortCol===c.key?'sorted':''}" ${c.sort?`onclick="sortTable('${c.key}')"`:''}>${c.label}${c.sort?`<span class="sort-icon">${S.sortCol===c.key?(S.sortDir==='desc'?'↓':'↑'):'↕'}</span>`:''}</th>`).join('');

  const tds=display.map(row=>{
    const ins=row.ins||{};
    const prevIns=S.prevCampaignInsights[row.id||ins.campaign_id]||{};
    const status=row.status||'UNKNOWN';
    const obj=row.objective||'';
    const name=ins.campaign_name||row.name||'—';
    const resultLabel=getResultLabel(obj);
    const results=getResultsFromIns(ins,obj);
    const objBadge=fmtObj(obj);
    const d=delta(parseFloat(ins.spend||0),parseFloat(prevIns.spend||0));
    const badge=d!==null?`<span class="kpi-delta ${Math.abs(d)<0.5?'delta-flat':d>0?'delta-up':'delta-down'}" style="font-size:9px;padding:1px 5px;margin-left:4px">${d>0?'+':''}${d.toFixed(1)}%</span>`:'';
    return `<tr>
      <td><div class="name-cell" title="${esc(name)}">${esc(name)}${objBadge?` <span class="pill pill-blue" style="margin-left:4px">${objBadge}</span>`:''}</div></td>
      <td><span class="pill ${statusPill(status)}">${fmtStatus(status)}</span></td>
      <td class="mono">${fmtR(ins.spend)}${badge}</td>
      <td class="mono">${fmtN(ins.impressions)}</td>
      <td class="mono">${fmtN(ins.clicks)}</td>
      <td class="mono">${parseFloat(ins.ctr||0).toFixed(2)}%</td>
      <td class="mono">${fmtR(ins.cpc)}</td>
      <td class="mono">${fmtR(ins.cpm)}</td>
      <td class="mono">${fmtN(ins.reach)}</td>
      <td class="mono">${results>0?`<strong>${fmtN(results)}</strong> <span style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px">${resultLabel}</span>`:'<span style="color:var(--text3)">—</span>'}</td>
      <td><button class="drill" onclick="drillCampaign('${row.id||ins.campaign_id}','${esc(name).replace(/'/g,"\\'")}','${(obj).replace(/'/g,"\\'")}')">Criativos →</button></td>
    </tr>`;
  }).join('');

  return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${tds}</tbody></table></div>`;
}

// AD GRID — ordenado por leads/vendas, imagens via CSS background-image (bypassa adblockers que bloqueiam <img> com src fbcdn.net)
function renderAdGrid() {
  const obj=S.selectedCampaignObjective||'';
  const resultLabel=getResultLabel(obj);

  const sorted=[...S.ads].sort((a,b)=>{
    const ra=getResultsFromIns(S.adInsights[a.id]||{},obj);
    const rb=getResultsFromIns(S.adInsights[b.id]||{},obj);
    if(rb!==ra) return rb-ra;
    return parseInt(S.adInsights[b.id]?.clicks||0)-parseInt(S.adInsights[a.id]?.clicks||0);
  });

  if(!sorted.length) return '<div class="state"><div class="state-icon">◌</div><div class="state-sub">Nenhum anúncio encontrado</div></div>';

  return `<div class="ad-grid">${sorted.map((ad,i)=>{
    const ins=S.adInsights[ad.id]||{};
    const results=getResultsFromIns(ins,obj);
    const ctr=parseFloat(ins.ctr||0).toFixed(2);

    // Tenta múltiplos campos para thumbnail — prioriza imagem maior
    const thumbUrl=
      ad.creative?.image_url||
      ad.creative?.thumbnail_url||
      ad.creative?.object_story_spec?.video_data?.image_url||
      ad.creative?.object_story_spec?.link_data?.picture||
      null;

    // background-image via style inline bypassa bloqueio de adblockers em <img src>
    const thumbHtml=thumbUrl
      ?`<div class="ad-thumb-bg" style="background-image:url('${thumbUrl}')"></div>`
      :`<div class="ad-thumb-empty">🎨<span>Sem preview</span></div>`;

    const rankLabel=i===0?`🥇 #1 ${resultLabel}`:i===1?`🥈 #2`:i===2?`🥉 #3`:null;

    return `<div class="ad-card" style="animation-delay:${i*0.04}s">
      ${rankLabel?`<div class="ad-rank">${rankLabel}</div>`:''}
      <div class="ad-thumb">${thumbHtml}</div>
      <div class="ad-info">
        <div class="ad-name" title="${esc(ad.name)}">${esc(ad.name)}</div>
        <div class="ad-stats">
          <div class="ad-stat primary">
            <div class="ad-stat-label">${resultLabel}</div>
            <div class="ad-stat-val">${results>0?fmtN(results):'—'}</div>
          </div>
          <div class="ad-stat">
            <div class="ad-stat-label">Gasto</div>
            <div class="ad-stat-val">${fmtR(ins.spend)}</div>
          </div>
          <div class="ad-stat">
            <div class="ad-stat-label">Cliques</div>
            <div class="ad-stat-val">${fmtN(ins.clicks)}</div>
          </div>
          <div class="ad-stat">
            <div class="ad-stat-label">CTR</div>
            <div class="ad-stat-val">${ctr}%</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function fmtR(v){v=parseFloat(v||0);if(isNaN(v))return'—';return'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtN(v){v=parseInt(v||0);if(isNaN(v))return'—';return v.toLocaleString('pt-BR')}
function fmtNShort(v){if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return Math.round(v).toString()}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function statusPill(s){return{ACTIVE:'pill-green',PAUSED:'pill-yellow',ARCHIVED:'pill-gray',DELETED:'pill-red'}[s?.toUpperCase()]||'pill-gray'}
function fmtStatus(s){return{ACTIVE:'Ativo',PAUSED:'Pausado',ARCHIVED:'Arquivado',DELETED:'Deletado'}[s?.toUpperCase()]||s}
function fmtObj(obj){return{OUTCOME_TRAFFIC:'Tráfego',OUTCOME_LEADS:'Leads',OUTCOME_SALES:'Vendas',OUTCOME_AWARENESS:'Alcance',OUTCOME_ENGAGEMENT:'Engaj.',LINK_CLICKS:'Tráfego',LEAD_GENERATION:'Leads',CONVERSIONS:'Conversões',REACH:'Alcance'}[obj]||''}
