<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ads · Método Prepara</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root {
  --brand:      #E8500A;
  --brand-lt:   rgba(232,80,10,0.12);
  --brand-bd:   rgba(232,80,10,0.25);
  --brand-glow: rgba(232,80,10,0.20);

  /* Objetivo */
  --c-captacao: #3b82f6;
  --c-vendas:   #10b981;
  --c-engaj:    #f59e0b;
  --c-trafego:  #8b5cf6;
  --c-outros:   #6b7280;

  /* Fundo — hierarquia em 4 camadas */
  --bg0: #080a0f;   /* fundo geral */
  --bg1: #0d1018;   /* sidebar / topbar */
  --bg2: #141922;   /* cards */
  --bg3: #1c2130;   /* inner cards / inputs */

  /* Bordas */
  --b0: rgba(255,255,255,0.05);
  --b1: rgba(255,255,255,0.09);
  --b2: rgba(255,255,255,0.14);

  /* Texto */
  --t0: #f0f2f8;
  --t1: #8892a4;
  --t2: #4a5568;

  /* Semântico */
  --green:    #22c55e;
  --green-lt: rgba(34,197,94,0.10);
  --red:      #ef4444;
  --red-lt:   rgba(239,68,68,0.10);
  --yellow:   #f59e0b;
  --yellow-lt:rgba(245,158,11,0.10);

  --r:    10px;
  --r-sm: 7px;
  --r-lg: 14px;
  --sidebar-w: 224px;
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box }

body {
  background: var(--bg0);
  color: var(--t0);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Grain overlay sutil */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.018'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9998;
}

/* ═══════════════════════════════════════════════
   SPLASH
═══════════════════════════════════════════════ */
#splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: opacity .7s ease, visibility .7s ease;
}
#splash.out { opacity: 0; visibility: hidden; pointer-events: none }

.splash-inner {
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
  animation: sIn .9s cubic-bezier(.16,1,.3,1) both;
}
@keyframes sIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.splash-mark {
  width: 72px; height: 72px; border-radius: 20px;
  background: var(--brand);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 60px var(--brand-glow), 0 0 120px rgba(232,80,10,.06);
}
.splash-mark svg { width: 38px; height: 38px }

.splash-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(42px, 7vw, 68px);
  letter-spacing: 8px; color: #fff; line-height: 1;
}
.splash-tagline {
  font-size: 10px; font-weight: 600; letter-spacing: 4px;
  text-transform: uppercase; color: #333;
}
.splash-progress {
  width: 100px; height: 2px;
  background: #1a1a1a; border-radius: 2px; margin-top: 28px;
  overflow: hidden;
}
.splash-bar {
  height: 100%; width: 0;
  background: linear-gradient(90deg, var(--brand), #ff8050);
  border-radius: 2px;
  animation: bLoad 1.9s cubic-bezier(.16,1,.3,1) .25s both;
}
@keyframes bLoad { from{width:0} to{width:100%} }

/* ═══════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════ */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--bg1);
  border-right: 1px solid var(--b0);
  display: flex; flex-direction: column;
  z-index: 100;
}

.sidebar-logo {
  padding: 22px 18px 18px;
  border-bottom: 1px solid var(--b0);
  display: flex; align-items: center; gap: 10px;
}
.logo-mark {
  width: 34px; height: 34px; border-radius: 9px;
  background: var(--brand);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 16px var(--brand-glow);
}
.logo-mark svg { width: 18px; height: 18px }
.logo-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px; letter-spacing: 2.5px; line-height: 1;
}
.logo-sub {
  font-size: 9px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--t2); margin-top: 2px;
}

.sidebar-nav {
  flex: 1; padding: 12px 10px;
  display: flex; flex-direction: column; gap: 2px;
}
.nav-section {
  font-size: 9px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--t2); padding: 10px 8px 5px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 10px; border-radius: var(--r-sm);
  font-size: 13px; font-weight: 500; color: var(--t1);
  cursor: pointer; transition: all .15s;
  border: none; background: transparent; width: 100%;
  text-align: left; position: relative;
}
.nav-item:hover { background: rgba(255,255,255,.04); color: var(--t0) }
.nav-item.active { background: var(--brand-lt); color: var(--t0) }
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 5px; bottom: 5px;
  width: 3px; background: var(--brand); border-radius: 2px;
}
.nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; opacity: .6 }
.nav-item.active .nav-icon { opacity: 1 }

.sidebar-foot {
  padding: 12px; border-top: 1px solid var(--b0);
}
.refresh-badge {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 11px; border-radius: var(--r-sm);
  background: rgba(255,255,255,.03);
  font-size: 11px; color: var(--t2);
  font-family: 'DM Mono', monospace;
}
.dot-live {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.main { margin-left: var(--sidebar-w); min-height: 100vh }
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 54px;
  background: rgba(13,16,24,.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--b0);
  position: sticky; top: 0; z-index: 50;
  gap: 10px; flex-wrap: wrap;
}
.breadcrumb { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; flex-shrink: 0 }
.bc { color: var(--t2); cursor: pointer; transition: color .12s }
.bc:hover { color: var(--brand) }
.bc.cur { color: var(--t0); cursor: default }
.bc-sep { color: var(--t2) }

.topbar-r { display: flex; align-items: center; gap: 8px; flex-wrap: wrap }
.period-group {
  display: flex; gap: 1px;
  background: var(--bg3); border: 1px solid var(--b0);
  border-radius: var(--r-sm); padding: 2px;
}
.period-btn {
  padding: 4px 12px; border-radius: 5px;
  font-size: 11px; font-weight: 700; color: var(--t2);
  background: transparent; border: none; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: all .12s;
}
.period-btn:hover { color: var(--t0) }
.period-btn.active { background: var(--brand); color: #fff }

.custom-picker {
  display: none; align-items: center; gap: 7px;
  background: var(--bg3); border: 1px solid var(--b1);
  border-radius: var(--r-sm); padding: 4px 10px;
}
.custom-picker label { font-size: 10px; font-weight: 700; color: var(--t2) }
.custom-picker input[type=date] {
  background: var(--bg2); border: 1px solid var(--b1);
  border-radius: 5px; color: var(--t0);
  font-family: 'DM Mono', monospace; font-size: 11px;
  padding: 3px 7px; outline: none; cursor: pointer;
  color-scheme: dark;
}
.custom-picker input[type=date]:focus { border-color: var(--brand) }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 13px; border-radius: var(--r-sm);
  font-size: 12px; font-weight: 600;
  cursor: pointer; border: none;
  font-family: 'Outfit', sans-serif; transition: all .15s;
}
.btn-ghost { background: rgba(255,255,255,.04); color: var(--t1); border: 1px solid var(--b1) }
.btn-ghost:hover { border-color: var(--brand); color: var(--brand) }
.btn-primary { background: var(--brand); color: #fff }
.btn-primary:hover { background: #c43d00 }
.btn-sm { padding: 3px 9px; font-size: 11px }

/* ═══════════════════════════════════════════════
   PAGE CONTENT
═══════════════════════════════════════════════ */
.content { padding: 22px 24px; max-width: 1440px }

/* ═══════════════════════════════════════════════
   PERIOD BADGE
═══════════════════════════════════════════════ */
.period-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--brand-lt); border: 1px solid var(--brand-bd);
  border-radius: 20px; padding: 4px 13px;
  font-size: 10px; font-weight: 700; letter-spacing: .5px;
  color: #ff8050; margin-bottom: 16px;
  font-family: 'DM Mono', monospace;
}

/* ═══════════════════════════════════════════════
   KPI CARDS — LINHA 1
═══════════════════════════════════════════════ */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 10px; margin-bottom: 16px;
}
@media(max-width:1280px) { .kpi-row { grid-template-columns: repeat(3,1fr) } }

.kpi {
  background: var(--bg2); border: 1px solid var(--b0);
  border-radius: var(--r-lg); padding: 16px 18px;
  transition: all .2s; position: relative; overflow: hidden;
  animation: fadeUp .5s ease both;
}
.kpi::after {
  content: '';
  position: absolute; bottom: 0; left: 20%; right: 20%; height: 1px;
  background: var(--brand); opacity: 0; transition: opacity .2s;
}
.kpi:hover { border-color: var(--b2); background: var(--bg3); transform: translateY(-2px) }
.kpi:hover::after { opacity: .6 }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }

.kpi-hd { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px }
.kpi-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t2) }
.kpi-icon { font-size: 14px; opacity: .5 }
.kpi-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px; letter-spacing: 1px;
  color: var(--t0); line-height: 1;
}
.kpi-foot { display: flex; align-items: center; justify-content: space-between; margin-top: 6px }
.kpi-sub { font-size: 10px; color: var(--t2); font-family: 'DM Mono', monospace }
.delta {
  display: inline-flex; align-items: center; gap: 2px;
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px;
}
.delta-up { background: var(--green-lt); color: var(--green) }
.delta-dn { background: var(--red-lt); color: var(--red) }
.delta-flat { background: rgba(255,255,255,.05); color: var(--t2) }

/* ═══════════════════════════════════════════════
   SKELETON
═══════════════════════════════════════════════ */
.skel {
  background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 6px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.skel-kpi { height: 88px; border-radius: var(--r-lg) }
.skel-card { border-radius: var(--r-lg) }

/* ═══════════════════════════════════════════════
   OBJETIVO BLOCKS — LINHA 2
═══════════════════════════════════════════════ */
.obj-blocks {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.obj-block {
  background: var(--bg2); border: 1px solid var(--b0);
  border-radius: var(--r-lg); padding: 15px 16px;
  animation: fadeUp .45s ease both;
  border-left: 3px solid transparent;
  transition: all .2s;
}
.obj-block:hover { border-color: var(--b2); transform: translateY(-2px) }
.obj-block[data-obj="captacao"] { border-left-color: var(--c-captacao) }
.obj-block[data-obj="vendas"]   { border-left-color: var(--c-vendas) }
.obj-block[data-obj="engaj"]    { border-left-color: var(--c-engaj) }
.obj-block[data-obj="trafego"]  { border-left-color: var(--c-trafego) }
.obj-block[data-obj="outros"]   { border-left-color: var(--c-outros) }

.obj-type {
  display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
}
.obj-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
.obj-type-label { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--t2) }
.obj-invest { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: .5px; color: var(--t0); margin-bottom: 2px }
.obj-main-row { display: flex; align-items: baseline; gap: 6px }
.obj-main-val { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; color: var(--t0) }
.obj-main-label { font-size: 10px; color: var(--t2) }
.obj-metrics { display: flex; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--b0) }
.obj-m { flex: 1 }
.obj-m-l { font-size: 8px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--t2); margin-bottom: 2px }
.obj-m-v { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--t0) }

/* ═══════════════════════════════════════════════
   GRID LAYOUTS
═══════════════════════════════════════════════ */
.grid-3-1 { display: grid; grid-template-columns: 1.7fr 1fr; gap: 12px; margin-bottom: 12px }
.grid-2   { display: grid; grid-template-columns: 1fr 1fr;   gap: 12px; margin-bottom: 12px }
@media(max-width:960px) { .grid-3-1, .grid-2 { grid-template-columns: 1fr } }

/* ═══════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════ */
.card {
  background: var(--bg2); border: 1px solid var(--b0);
  border-radius: var(--r-lg); overflow: hidden;
  margin-bottom: 12px; animation: fadeUp .4s ease both;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 13px 18px; border-bottom: 1px solid var(--b0);
}
.card-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px; letter-spacing: 2px; color: var(--t0);
}
.card-meta { font-size: 10px; color: var(--t2); font-family: 'DM Mono', monospace }

/* ═══════════════════════════════════════════════
   LINE CHART
═══════════════════════════════════════════════ */
.chart-wrap { padding: 14px 18px 8px }
.chart-area { width: 100%; height: 175px }

.metric-tabs {
  display: flex; gap: 1px;
  background: var(--bg0); border: 1px solid var(--b0);
  border-radius: var(--r-sm); padding: 2px;
}
.metric-tab {
  padding: 4px 11px; border-radius: 5px;
  font-size: 11px; font-weight: 600; color: var(--t2);
  background: transparent; border: none; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: all .12s;
}
.metric-tab:hover { color: var(--t0) }
.metric-tab.active { background: var(--brand); color: #fff }

/* ═══════════════════════════════════════════════
   PIE CHART (SVG manual)
═══════════════════════════════════════════════ */
.pie-wrap { padding: 16px 18px; display: flex; gap: 18px; align-items: center }
.pie-svg { flex-shrink: 0 }
.pie-legend { display: flex; flex-direction: column; gap: 8px; flex: 1 }
.pie-leg-row { display: flex; align-items: center; justify-content: space-between; gap: 8px }
.pie-leg-left { display: flex; align-items: center; gap: 7px }
.pie-leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0 }
.pie-leg-name { font-size: 11px; font-weight: 500; color: var(--t1) }
.pie-leg-right { text-align: right }
.pie-leg-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--t0); display: block }
.pie-leg-pct { font-size: 9px; color: var(--t2); font-family: 'DM Mono', monospace }

/* ═══════════════════════════════════════════════
   BAR CHART
═══════════════════════════════════════════════ */
.bars { padding: 12px 18px 14px; display: flex; flex-direction: column; gap: 9px }
.bar-row { display: flex; align-items: center; gap: 9px }
.bar-lbl { font-size: 11px; font-weight: 500; color: var(--t1); width: 130px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0 }
.bar-track { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden }
.bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--brand), #ff8050); transition: width 1s cubic-bezier(.16,1,.3,1) }
.bar-val { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--t1); width: 80px; text-align: right; flex-shrink: 0 }

/* ═══════════════════════════════════════════════
   TABLE
═══════════════════════════════════════════════ */
.table-wrap { overflow-x: auto }
table { width: 100%; border-collapse: collapse }
thead tr { border-bottom: 1px solid var(--b1) }
th {
  padding: 9px 13px; text-align: left;
  font-size: 9px; font-weight: 700; letter-spacing: 1.2px;
  text-transform: uppercase; color: var(--t2);
  white-space: nowrap; cursor: pointer; user-select: none;
  background: var(--bg1); transition: color .12s;
}
th:hover { color: var(--brand) }
th.sorted { color: var(--brand) }
td {
  padding: 10px 13px; font-size: 12px; font-weight: 500;
  border-bottom: 1px solid rgba(255,255,255,.03);
  white-space: nowrap; transition: background .1s;
}
tr:last-child td { border-bottom: none }
tr:nth-child(even) td { background: rgba(255,255,255,.012) }
tr:hover td { background: rgba(232,80,10,0.04) !important }
.mono { font-family: 'DM Mono', monospace; font-size: 12px }
.name-cell { max-width: 210px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.sort-icon { margin-left: 2px; opacity: .4; font-size: 9px }
th.sorted .sort-icon { opacity: 1 }

/* ═══════════════════════════════════════════════
   PILLS & BADGES
═══════════════════════════════════════════════ */
.pill {
  display: inline-flex; align-items: center;
  font-size: 8px; font-weight: 800;
  padding: 2px 7px; border-radius: 20px;
  letter-spacing: .8px; text-transform: uppercase;
}
.pill-green  { background: var(--green-lt); color: var(--green) }
.pill-yellow { background: var(--yellow-lt); color: var(--yellow) }
.pill-red    { background: var(--red-lt); color: var(--red) }
.pill-gray   { background: rgba(255,255,255,.06); color: var(--t2) }

/* Badges de objetivo */
.obj-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 8px; font-weight: 700; padding: 2px 7px;
  border-radius: 20px; letter-spacing: .5px; text-transform: uppercase;
}
.obj-pill-cap  { background: rgba(59,130,246,.12);  color: #60a5fa }
.obj-pill-vnd  { background: rgba(16,185,129,.12);  color: #34d399 }
.obj-pill-eng  { background: rgba(245,158,11,.12);  color: #fbbf24 }
.obj-pill-trf  { background: rgba(139,92,246,.12);  color: #a78bfa }
.obj-pill-etc  { background: rgba(255,255,255,.06); color: var(--t2) }

.drill {
  background: var(--brand-lt); border: 1px solid var(--brand-bd);
  color: #ff8050; padding: 4px 9px; border-radius: 6px;
  font-size: 10px; font-weight: 700; cursor: pointer;
  font-family: 'Outfit', sans-serif; transition: all .12s;
}
.drill:hover { background: var(--brand); color: #fff; border-color: var(--brand) }

/* ═══════════════════════════════════════════════
   AD GRID
═══════════════════════════════════════════════ */
.ad-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 12px; padding: 14px 18px;
}
.ad-card {
  background: var(--bg3); border: 1px solid var(--b0);
  border-radius: var(--r-lg); overflow: hidden;
  transition: all .2s; position: relative;
  animation: fadeUp .4s ease both;
}
.ad-card:hover { border-color: var(--b2); transform: translateY(-3px); box-shadow: 0 12px 36px rgba(0,0,0,.3) }

.ad-badge {
  position: absolute; top: 8px; left: 8px; z-index: 2;
  font-family: 'Bebas Neue', sans-serif; font-size: 11px;
  letter-spacing: 1px; padding: 3px 10px; border-radius: 20px;
}
.ad-badge.champion  { background: #E8500A; color: #fff; box-shadow: 0 2px 10px rgba(232,80,10,.4) }
.ad-badge.scale     { background: var(--green); color: #fff; box-shadow: 0 2px 10px rgba(34,197,94,.3) }
.ad-badge.watch     { background: var(--yellow); color: #000 }
.ad-badge.rank      { background: rgba(0,0,0,.7); backdrop-filter: blur(8px); color: var(--t1) }

.ad-thumb { width: 100%; aspect-ratio: 1.91/1; background: var(--bg0); overflow: hidden; position: relative }
.ad-thumb-bg { width: 100%; height: 100%; background-size: cover; background-position: center; transition: transform .3s }
.ad-card:hover .ad-thumb-bg { transform: scale(1.04) }
.ad-thumb-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; height: 100%; font-size: 22px }
.ad-thumb-empty span { font-size: 10px; color: var(--t2) }

.ad-info { padding: 11px 13px; background: var(--bg2) }
.ad-name { font-size: 11px; font-weight: 600; color: var(--t0); margin-bottom: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.ad-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px }
.ad-stat { background: var(--bg3); border: 1px solid var(--b0); border-radius: 6px; padding: 6px 8px }
.ad-stat.hi { border-color: rgba(232,80,10,.22); background: rgba(232,80,10,.06) }
.ad-stat-l { font-size: 8px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--t2); margin-bottom: 2px }
.ad-stat-v { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--t0) }
.ad-stat.hi .ad-stat-v { color: #ff8050 }

/* ═══════════════════════════════════════════════
   STATES
═══════════════════════════════════════════════ */
.state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 10px }
.state-sub { font-size: 12px; color: var(--t2) }
.spinner { width: 26px; height: 26px; border: 2px solid var(--b1); border-top-color: var(--brand); border-radius: 50%; animation: spin .7s linear infinite }
@keyframes spin { to{transform:rotate(360deg)} }
.err-bar { background: var(--red-lt); border: 1px solid rgba(239,68,68,.2); border-radius: var(--r); padding: 11px 15px; color: var(--red); font-size: 12px; font-weight: 600; margin-bottom: 14px }

/* ═══════════════════════════════════════════════
   STAGGER HELPERS
═══════════════════════════════════════════════ */
.kpi:nth-child(1){animation-delay:.02s} .kpi:nth-child(2){animation-delay:.05s}
.kpi:nth-child(3){animation-delay:.08s} .kpi:nth-child(4){animation-delay:.11s}
.kpi:nth-child(5){animation-delay:.14s} .kpi:nth-child(6){animation-delay:.17s}
.obj-block:nth-child(1){animation-delay:.03s} .obj-block:nth-child(2){animation-delay:.06s}
.obj-block:nth-child(3){animation-delay:.09s} .obj-block:nth-child(4){animation-delay:.12s}
</style>
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="splash">
  <div class="splash-inner">
    <div class="splash-mark">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M5 17V8l5 6 5-6v9" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="splash-name">MÉTODO PREPARA</div>
    <div class="splash-tagline">Meta Ads Dashboard</div>
    <div class="splash-progress"><div class="splash-bar"></div></div>
  </div>
</div>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M5 17V8l5 6 5-6v9" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">PREPARA</div>
      <div class="logo-sub">Meta Ads</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Navegação</div>
    <button class="nav-item active" onclick="setView('overview')" id="nav-overview">
      <span class="nav-icon">⬡</span> Visão Geral
    </button>
    <button class="nav-item" onclick="setView('campaigns')" id="nav-campaigns">
      <span class="nav-icon">◈</span> Campanhas
    </button>
    <button class="nav-item" onclick="setView('ads')" id="nav-ads">
      <span class="nav-icon">◰</span> Criativos
    </button>
  </nav>
  <div class="sidebar-foot">
    <div class="refresh-badge">
      <div class="dot-live"></div>
      <span id="last-update">—</span>
    </div>
  </div>
</aside>

<!-- ══ MAIN ══ -->
<main class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">
      <span class="bc cur">Visão Geral</span>
    </div>
    <div class="topbar-r">
      <div class="period-group">
        <button class="period-btn" data-days="7">7d</button>
        <button class="period-btn active" data-days="14">14d</button>
        <button class="period-btn" data-days="30">30d</button>
        <button class="period-btn" data-days="60">60d</button>
        <button class="period-btn" data-days="90">90d</button>
        <button class="period-btn" data-days="custom">Custom</button>
      </div>
      <div class="custom-picker" id="cpicker">
        <label>DE</label><input type="date" id="date-since">
        <label>ATÉ</label><input type="date" id="date-until">
        <button class="btn btn-primary btn-sm" onclick="applyCustom()">OK</button>
      </div>
      <button class="btn btn-ghost" onclick="loadAll()">↺ Atualizar</button>
    </div>
  </div>

  <div class="content" id="page">
    <div class="state"><div class="spinner"></div><div class="state-sub">Inicializando...</div></div>
  </div>
</main>

<script>
/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
const S = {
  period:14, customSince:null, customUntil:null,
  view:'overview',
  campaigns:[], allInsights:[], prevInsights:[],
  campMap:{}, prevCampMap:{}, daily:[],
  ads:[], adInsights:{},
  selCamp:null, selCampName:null, selCampObj:null,
  sortCol:'spend', sortDir:'desc',
  chartMetric:'spend', loading:false,
};

const API = '/api/meta';

/* ── utils ── */
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtR = v => { v=parseFloat(v||0); return isNaN(v)?'—':'R$ '+v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) };
const fmtN = v => { v=parseInt(v||0); return isNaN(v)?'—':v.toLocaleString('pt-BR') };
const fmtK = v => { if(v>=1e6) return (v/1e6).toFixed(1)+'M'; if(v>=1e3) return (v/1e3).toFixed(1)+'K'; return Math.round(v).toString() };
const statusPill = s => ({'ACTIVE':'pill-green','PAUSED':'pill-yellow','ARCHIVED':'pill-gray','DELETED':'pill-red'}[s?.toUpperCase()]||'pill-gray');
const fmtStatus = s => ({'ACTIVE':'Ativo','PAUSED':'Pausado','ARCHIVED':'Arquivado','DELETED':'Deletado'}[s?.toUpperCase()]||s);

/* ── objective helpers ── */
function objType(objective) {
  const o = (objective||'').toUpperCase();
  if (o.includes('SALES')||o.includes('CONVERSIONS')||o==='OUTCOME_SALES') return 'vendas';
  if (o.includes('LEADS')||o.includes('LEAD')||o==='OUTCOME_LEADS') return 'captacao';
  if (o.includes('ENGAGEMENT')||o==='OUTCOME_ENGAGEMENT') return 'engaj';
  if (o.includes('TRAFFIC')||o.includes('LINK_CLICKS')||o==='OUTCOME_TRAFFIC') return 'trafego';
  return 'outros';
}

const objLabel = t => ({'captacao':'Captação','vendas':'Vendas','engaj':'Engajamento','trafego':'Tráfego','outros':'Outros'}[t]||t);
const objColor = t => ({'captacao':'#3b82f6','vendas':'#10b981','engaj':'#f59e0b','trafego':'#8b5cf6','outros':'#6b7280'}[t]||'#6b7280');
const objPillClass = t => ({'captacao':'obj-pill-cap','vendas':'obj-pill-vnd','engaj':'obj-pill-eng','trafego':'obj-pill-trf','outros':'obj-pill-etc'}[t]||'obj-pill-etc');

const objMainLabel = t => ({'captacao':'Leads','vendas':'Compras','engaj':'Engajamentos','trafego':'Cliques','outros':'Resultados'}[t]||'Resultados');
const objCostLabel = t => ({'captacao':'CPL','vendas':'CPA','engaj':'CPE','trafego':'CPC','outros':'CPR'}[t]||'CPR');

function fmtObjBadge(objective) {
  return {'OUTCOME_TRAFFIC':'Tráfego','OUTCOME_LEADS':'Leads','OUTCOME_SALES':'Vendas','OUTCOME_AWARENESS':'Alcance','OUTCOME_ENGAGEMENT':'Engaj.','LINK_CLICKS':'Tráfego','LEAD_GENERATION':'Leads','CONVERSIONS':'Conversões','REACH':'Alcance'}[objective]||'';
}

/* ── result extraction ── */
function getMainResult(ins, type) {
  if (!ins.actions) return 0;
  if (type==='vendas') {
    const p = ins.actions.find(a=>a.action_type==='offsite_conversion.fb_pixel_purchase');
    if (p) return parseInt(p.value||0);
  }
  if (type==='captacao') {
    const l = ins.actions.find(a=>a.action_type==='lead'||a.action_type==='offsite_conversion.fb_pixel_lead');
    if (l) return parseInt(l.value||0);
  }
  if (type==='engaj') {
    const e = ins.actions.find(a=>a.action_type==='post_engagement'||a.action_type==='page_engagement');
    if (e) return parseInt(e.value||0);
  }
  if (type==='trafego') return parseInt(ins.clicks||0);
  // fallback
  const purchase = ins.actions.find(a=>a.action_type==='offsite_conversion.fb_pixel_purchase');
  if (purchase) return parseInt(purchase.value||0);
  const lead = ins.actions.find(a=>a.action_type==='lead'||a.action_type==='offsite_conversion.fb_pixel_lead');
  if (lead) return parseInt(lead.value||0);
  return ins.actions.reduce((s,a)=>s+parseInt(a.value||0),0);
}

function getResultsAny(ins) {
  if (!ins.actions) return 0;
  const prio=['offsite_conversion.fb_pixel_purchase','lead','offsite_conversion.fb_pixel_lead','link_click'];
  for (const k of prio) { const f=ins.actions.find(a=>a.action_type===k); if(f) return parseInt(f.value||0); }
  return ins.actions.reduce((s,a)=>s+parseInt(a.value||0),0);
}

function agg(items) {
  let spend=0,impressions=0,clicks=0,reach=0,results=0,ctrS=0,cpcS=0,cpmS=0,freqS=0,n=0;
  items.forEach(ins=>{
    spend+=parseFloat(ins.spend||0); impressions+=parseInt(ins.impressions||0);
    clicks+=parseInt(ins.clicks||0); reach+=parseInt(ins.reach||0);
    results+=getResultsAny(ins);
    ctrS+=parseFloat(ins.ctr||0); cpcS+=parseFloat(ins.cpc||0);
    cpmS+=parseFloat(ins.cpm||0); freqS+=parseFloat(ins.frequency||0); n++;
  });
  return {spend,impressions,clicks,reach,results,
    ctr:n?ctrS/n:0, cpc:n?cpcS/n:0, cpm:n?cpmS/n:0, frequency:n?freqS/n:0, n};
}

function delta(c,p) { if(!p||p===0) return null; return ((c-p)/p)*100; }
function deltaHTML(c,p,inv=false) {
  const d=delta(c,p); if(d===null) return '';
  const good = inv?d<0:d>0;
  const cls = Math.abs(d)<.5?'delta-flat':good?'delta-up':'delta-dn';
  const arr = Math.abs(d)<.5?'→':d>0?'↑':'↓';
  return `<span class="delta ${cls}">${arr} ${d>0?'+':''}${d.toFixed(1)}%</span>`;
}

/* ── dates ── */
function getDates(days,offset=0) {
  if(S.customSince&&S.customUntil&&offset===0) return {since:S.customSince,until:S.customUntil};
  const until=new Date(); until.setDate(until.getDate()-offset*days);
  const since=new Date(until); since.setDate(since.getDate()-days);
  if(offset>0) until.setDate(until.getDate()-1);
  const fmt=d=>d.toISOString().split('T')[0];
  return {since:fmt(since),until:fmt(until)};
}

async function apiFetch(endpoint,extra={}) {
  const dates=extra.since?{since:extra.since,until:extra.until}:getDates(S.period);
  const p=new URLSearchParams({endpoint,...dates,...extra});
  const res=await fetch(`${API}?${p}`);
  const json=await res.json();
  if(json.error) throw new Error(json.error);
  return json;
}
async function apiFetchPrev(endpoint,extra={}) {
  const {since,until}=getDates(S.period,1);
  const p=new URLSearchParams({endpoint,since,until,...extra});
  const res=await fetch(`${API}?${p}`);
  const json=await res.json();
  if(json.error) return {data:[]};
  return json;
}

/* ══════════════════════════════════════════════
   LOAD
══════════════════════════════════════════════ */
async function loadAll() {
  if(S.loading) return;
  S.loading=true; showSkeleton();
  try {
    const [campData,insData,insDataPrev,dailyData] = await Promise.all([
      apiFetch('campaigns'),
      apiFetch('all_campaigns_insights'),
      apiFetchPrev('all_campaigns_insights'),
      apiFetch('daily'),
    ]);
    S.campaigns=campData.data||[];
    S.allInsights=insData.data||[];
    S.prevInsights=insDataPrev.data||[];
    S.campMap={}; S.allInsights.forEach(i=>{S.campMap[i.campaign_id]=i});
    S.prevCampMap={}; S.prevInsights.forEach(i=>{S.prevCampMap[i.campaign_id]=i});
    S.daily=(dailyData.data||[]).sort((a,b)=>a.date_start.localeCompare(b.date_start));
    S.loading=false; updateLastUpdate(); renderView();
  } catch(err) { S.loading=false; showError(err.message); }
}

async function loadAds(campId) {
  showLoading();
  try {
    const adsData=await apiFetch('ads',{id:campId});
    const ads=adsData.data||[];
    const insResults=await Promise.all(
      ads.map(ad=>apiFetch('ad_insights',{id:ad.id})
        .then(r=>({id:ad.id,ins:r.data?.[0]||{}}))
        .catch(()=>({id:ad.id,ins:{}})))
    );
    S.adInsights={};
    insResults.forEach(r=>{S.adInsights[r.id]=r.ins});
    S.ads=ads; renderView();
  } catch(err) { showError(err.message); }
}

/* ══════════════════════════════════════════════
   PERIOD BUTTONS
══════════════════════════════════════════════ */
document.querySelectorAll('.period-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(btn.dataset.days==='custom') {
      const pk=document.getElementById('cpicker');
      pk.style.display='flex';
      const {since,until}=getDates(S.period);
      document.getElementById('date-since').value=S.customSince||since;
      document.getElementById('date-until').value=S.customUntil||until;
    } else {
      document.getElementById('cpicker').style.display='none';
      S.period=parseInt(btn.dataset.days);
      S.customSince=null; S.customUntil=null;
      loadAll();
    }
  });
});

function applyCustom() {
  const s=document.getElementById('date-since').value;
  const u=document.getElementById('date-until').value;
  if(!s||!u){alert('Preencha as datas.');return}
  if(s>u){alert('Data inicial não pode ser maior.');return}
  S.period=Math.round((new Date(u)-new Date(s))/(86400000))+1||1;
  S.customSince=s; S.customUntil=u; loadAll();
}

/* ══════════════════════════════════════════════
   VIEW ROUTING
══════════════════════════════════════════════ */
function setView(view,campId,campName,campObj) {
  S.view=view;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById(view==='campaign-detail'?'nav-ads':'nav-'+view)?.classList.add('active');
  if(view==='campaign-detail') {
    S.selCamp=campId; S.selCampName=campName; S.selCampObj=campObj;
    loadAds(campId); updateBreadcrumb(); return;
  }
  renderView();
}

function renderView() {
  updateBreadcrumb();
  const el=document.getElementById('page');
  if(S.view==='overview')         el.innerHTML=renderOverview();
  else if(S.view==='campaigns')   el.innerHTML=renderCampaigns();
  else if(S.view==='ads')         el.innerHTML=renderAds();
  else if(S.view==='campaign-detail') el.innerHTML=renderCampaignDetail();
  bindChartTabs(); animateBars();
}

function periodLabel() {
  if(S.customSince&&S.customUntil) return `${S.customSince} → ${S.customUntil}`;
  return `últimos ${S.period} dias`;
}

/* ══════════════════════════════════════════════
   OVERVIEW
══════════════════════════════════════════════ */
function renderOverview() {
  const curr=agg(S.allInsights), prev=agg(S.prevInsights);
  return `
    <div class="period-badge">📅 ${periodLabel()}</div>
    ${renderKPIs(curr,prev)}
    ${renderObjBlocks()}
    <div class="grid-3-1">
      <div class="card">
        <div class="card-header">
          <span class="card-title">EVOLUÇÃO DIÁRIA</span>
          <div class="metric-tabs" id="chart-tabs">
            <button class="metric-tab active" data-metric="spend">Gasto</button>
            <button class="metric-tab" data-metric="clicks">Cliques</button>
            <button class="metric-tab" data-metric="impressions">Impressões</button>
            <button class="metric-tab" data-metric="ctr">CTR</button>
          </div>
        </div>
        <div class="chart-wrap">${renderLineChart()}</div>
      </div>
      <div class="card">
        <div class="card-header">
          <span class="card-title">VERBA POR OBJETIVO</span>
          <span class="card-meta">distribuição %</span>
        </div>
        ${renderPieChart()}
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">CAMPANHAS</span>
        <span class="card-meta">${S.allInsights.length} ativas no período</span>
      </div>
      ${renderCampaignTable(true)}
    </div>`;
}

function renderCampaigns() {
  const curr=agg(S.allInsights), prev=agg(S.prevInsights);
  return `
    <div class="period-badge">📅 ${periodLabel()}</div>
    ${renderKPIs(curr,prev)}
    <div class="card">
      <div class="card-header">
        <span class="card-title">TODAS AS CAMPANHAS</span>
        <span class="card-meta">${S.allInsights.length} com dados</span>
      </div>
      ${renderCampaignTable(false)}
    </div>`;
}

function renderAds() {
  if(!S.selCamp) return `
    <p style="color:var(--t1);font-size:13px;font-weight:600;margin-bottom:12px">Selecione uma campanha para ver os criativos:</p>
    <div class="card">
      <div class="card-header"><span class="card-title">CAMPANHAS</span></div>
      ${renderCampaignTable(false)}
    </div>`;
  return renderCampaignDetail();
}

function renderCampaignDetail() {
  const type=objType(S.selCampObj||'');
  const mainLabel=objMainLabel(type);
  return `<div class="card">
    <div class="card-header">
      <span class="card-title">CRIATIVOS · ${esc(S.selCampName||'')}</span>
      <span class="card-meta">${S.ads.length} anúncios · ranking por ${mainLabel}</span>
    </div>
    ${renderAdGrid()}
  </div>`;
}

/* ══════════════════════════════════════════════
   KPI ROW
══════════════════════════════════════════════ */
function renderKPIs(curr,prev) {
  const totalLeads  = S.allInsights.reduce((s,ins)=>{
    const camp=S.campaigns.find(c=>c.id===ins.campaign_id)||{};
    const t=objType(camp.objective||'');
    return s+(t==='captacao'?getMainResult(ins,'captacao'):0);
  },0);
  const totalVendas = S.allInsights.reduce((s,ins)=>{
    const camp=S.campaigns.find(c=>c.id===ins.campaign_id)||{};
    const t=objType(camp.objective||'');
    return s+(t==='vendas'?getMainResult(ins,'vendas'):0);
  },0);
  const prevLeads = S.prevInsights.reduce((s,ins)=>{
    const camp=S.campaigns.find(c=>c.id===ins.campaign_id)||{};
    const t=objType(camp.objective||'');
    return s+(t==='captacao'?getMainResult(ins,'captacao'):0);
  },0);

  const kpis=[
    {icon:'💸', label:'Investimento',  val:fmtR(curr.spend),           sub:`${S.allInsights.length} campanhas`, d:deltaHTML(curr.spend,prev.spend)},
    {icon:'🎯', label:'Leads',         val:fmtK(totalLeads),            sub:`CPL: ${totalLeads>0?fmtR(S.allInsights.filter(i=>{const c=S.campaigns.find(x=>x.id===i.campaign_id)||{};return objType(c.objective||'')==='captacao'}).reduce((s,i)=>s+parseFloat(i.spend||0),0)/totalLeads):'—'}`, d:deltaHTML(totalLeads,prevLeads)},
    {icon:'🛒', label:'Compras',       val:fmtK(totalVendas),           sub:`CPA: ${totalVendas>0?fmtR(S.allInsights.filter(i=>{const c=S.campaigns.find(x=>x.id===i.campaign_id)||{};return objType(c.objective||'')==='vendas'}).reduce((s,i)=>s+parseFloat(i.spend||0),0)/totalVendas):'—'}`, d:''},
    {icon:'👁',  label:'Impressões',   val:fmtK(curr.impressions),      sub:`CPM: ${fmtR(curr.cpm)}`, d:deltaHTML(curr.impressions,prev.impressions)},
    {icon:'🖱',  label:'Cliques',      val:fmtK(curr.clicks),           sub:`CTR: ${curr.ctr.toFixed(2)}%`, d:deltaHTML(curr.clicks,prev.clicks)},
    {icon:'📡',  label:'Alcance',      val:fmtK(curr.reach),            sub:`Freq: ${curr.frequency.toFixed(2)}`, d:deltaHTML(curr.reach,prev.reach)},
  ];
  return `<div class="kpi-row">${kpis.map((k,i)=>`
    <div class="kpi" style="animation-delay:${i*.04}s">
      <div class="kpi-hd"><span class="kpi-label">${k.label}</span><span class="kpi-icon">${k.icon}</span></div>
      <div class="kpi-val">${k.val}</div>
      <div class="kpi-foot"><span class="kpi-sub">${k.sub}</span>${k.d||''}</div>
    </div>`).join('')}</div>`;
}

/* ══════════════════════════════════════════════
   OBJETIVO BLOCKS
══════════════════════════════════════════════ */
function renderObjBlocks() {
  // Agrupa insighsts por tipo de objetivo
  const groups = {};
  S.allInsights.forEach(ins=>{
    const camp=S.campaigns.find(c=>c.id===ins.campaign_id)||{};
    const t=objType(camp.objective||'');
    if(!groups[t]) groups[t]={'spend':0,'results':0,'camps':0,'ctr':0,'cpc':0,'n':0};
    const g=groups[t];
    g.spend+=parseFloat(ins.spend||0);
    g.results+=getMainResult(ins,t);
    g.ctr+=parseFloat(ins.ctr||0);
    g.cpc+=parseFloat(ins.cpc||0);
    g.camps++; g.n++;
  });

  const order=['captacao','vendas','engaj','trafego','outros'];
  const active=order.filter(t=>groups[t]);
  if(!active.length) return '';

  return `<div class="obj-blocks">${active.map((t,i)=>{
    const g=groups[t];
    const mainLabel=objMainLabel(t);
    const costLabel=objCostLabel(t);
    const cost=g.results>0?g.spend/g.results:0;
    const avgCTR=g.n?g.ctr/g.n:0;
    return `<div class="obj-block" data-obj="${t}" style="animation-delay:${i*.04}s">
      <div class="obj-type">
        <div class="obj-dot" style="background:${objColor(t)}"></div>
        <span class="obj-type-label">${objLabel(t)}</span>
      </div>
      <div class="obj-invest">${fmtR(g.spend)}</div>
      <div class="obj-main-row">
        <span class="obj-main-val">${fmtK(g.results)}</span>
        <span class="obj-main-label">${mainLabel}</span>
      </div>
      <div class="obj-metrics">
        <div class="obj-m">
          <div class="obj-m-l">${costLabel}</div>
          <div class="obj-m-v">${cost>0?fmtR(cost):'—'}</div>
        </div>
        <div class="obj-m">
          <div class="obj-m-l">CTR Méd.</div>
          <div class="obj-m-v">${avgCTR.toFixed(2)}%</div>
        </div>
        <div class="obj-m">
          <div class="obj-m-l">Camps.</div>
          <div class="obj-m-v">${g.camps}</div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

/* ══════════════════════════════════════════════
   PIE CHART (SVG manual)
══════════════════════════════════════════════ */
function renderPieChart() {
  const groups={};
  S.allInsights.forEach(ins=>{
    const camp=S.campaigns.find(c=>c.id===ins.campaign_id)||{};
    const t=objType(camp.objective||'');
    groups[t]=(groups[t]||0)+parseFloat(ins.spend||0);
  });

  const order=['captacao','vendas','engaj','trafego','outros'];
  const items=order.filter(t=>groups[t]>0).map(t=>({t,v:groups[t]}));
  if(!items.length) return '<div class="state"><div class="state-sub">Sem dados</div></div>';

  const total=items.reduce((s,i)=>s+i.v,0);
  if(total===0) return '<div class="state"><div class="state-sub">Sem dados</div></div>';

  // Build SVG pie
  const cx=70, cy=70, r=60, ri=36;
  let html='';
  let angle=-Math.PI/2; // começa no topo

  items.forEach(item=>{
    const pct=item.v/total;
    const a=pct*2*Math.PI;
    const x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+a), y2=cy+r*Math.sin(angle+a);
    const xi1=cx+ri*Math.cos(angle), yi1=cy+ri*Math.sin(angle);
    const xi2=cx+ri*Math.cos(angle+a), yi2=cy+ri*Math.sin(angle+a);
    const large=a>Math.PI?1:0;
    const color=objColor(item.t);
    html+=`<path d="M${xi1} ${yi1} L${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ri} ${ri} 0 ${large} 0 ${xi1} ${yi1}" fill="${color}" opacity=".9"/>`;
    angle+=a;
  });

  // Center label
  html+=`<text x="${cx}" y="${cy-4}" text-anchor="middle" fill="#f0f2f8" font-size="11" font-family="DM Mono,monospace" font-weight="500">${fmtR(total).replace('R$ ','')}</text>`;
  html+=`<text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#4a5568" font-size="9" font-family="Outfit,sans-serif" letter-spacing="1">TOTAL</text>`;

  const svgPie=`<svg class="pie-svg" viewBox="0 0 140 140" width="140" height="140" xmlns="http://www.w3.org/2000/svg">${html}</svg>`;

  const legend=items.map(item=>`
    <div class="pie-leg-row">
      <div class="pie-leg-left">
        <div class="pie-leg-dot" style="background:${objColor(item.t)}"></div>
        <span class="pie-leg-name">${objLabel(item.t)}</span>
      </div>
      <div class="pie-leg-right">
        <span class="pie-leg-val">${fmtR(item.v)}</span>
        <span class="pie-leg-pct">${(item.v/total*100).toFixed(1)}%</span>
      </div>
    </div>`).join('');

  return `<div class="pie-wrap">${svgPie}<div class="pie-legend">${legend}</div></div>`;
}

/* ══════════════════════════════════════════════
   LINE CHART
══════════════════════════════════════════════ */
function renderLineChart() {
  const data=S.daily;
  if(!data.length) return '<div class="state"><div class="state-sub">Sem dados diários</div></div>';
  const metric=S.chartMetric;
  const vals=data.map(d=>{
    if(metric==='spend') return parseFloat(d.spend||0);
    if(metric==='clicks') return parseInt(d.clicks||0);
    if(metric==='impressions') return parseInt(d.impressions||0);
    if(metric==='ctr') return parseFloat(d.ctr||0);
    return 0;
  });
  const W=600,H=160,P={top:12,right:12,bottom:28,left:54};
  const cW=W-P.left-P.right, cH=H-P.top-P.bottom;
  const maxV=Math.max(...vals)||1, minV=Math.min(...vals);
  const xStep=cW/Math.max(vals.length-1,1);
  const yS=v=>cH-((v-minV)/(maxV-minV||1))*cH;
  const pts=vals.map((v,i)=>`${P.left+i*xStep},${P.top+yS(v)}`);
  const area=`${P.left},${P.top+cH} ${pts.join(' ')} ${P.left+(vals.length-1)*xStep},${P.top+cH}`;
  const ticks=[0,.33,.66,1].map(t=>{
    const v=minV+(maxV-minV)*t, y=P.top+cH-t*cH;
    const lb=metric==='spend'?fmtR(v):metric==='ctr'?v.toFixed(2)+'%':fmtK(v);
    return `<text x="${P.left-6}" y="${y+4}" text-anchor="end" fill="#4a5568" font-size="9" font-family="DM Mono,monospace">${lb}</text>
      <line x1="${P.left}" y1="${y}" x2="${P.left+cW}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-width="1"/>`;
  }).join('');
  const step=Math.max(1,Math.floor(data.length/6));
  const xLbls=data.map((d,i)=>i%step!==0&&i!==data.length-1?'':
    `<text x="${P.left+i*xStep}" y="${H-2}" text-anchor="middle" fill="#4a5568" font-size="9">${d.date_start.slice(5)}</text>`).join('');
  const dots=pts.map((p,i)=>{const[px,py]=p.split(',');return`<circle cx="${px}" cy="${py}" r="${i===vals.length-1?4:2}" fill="${i===vals.length-1?'#ff8050':'#E8500A'}" stroke="rgba(0,0,0,.4)" stroke-width="1.5" opacity="${i===vals.length-1?1:.75}"/>`;}).join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="chart-area" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
    <defs>
      <linearGradient id="aG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#E8500A" stop-opacity=".12"/>
        <stop offset="100%" stop-color="#E8500A" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="lG" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#E8500A"/>
        <stop offset="100%" stop-color="#ff8050"/>
      </linearGradient>
    </defs>
    ${ticks}
    <polygon points="${area}" fill="url(#aG)"/>
    <polyline points="${pts.join(' ')}" fill="none" stroke="url(#lG)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}${xLbls}
  </svg>`;
}

function bindChartTabs() {
  document.querySelectorAll('.metric-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.metric-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      S.chartMetric=btn.dataset.metric;
      const w=document.querySelector('.chart-wrap');
      if(w){w.innerHTML=renderLineChart(); bindChartTabs();}
    });
  });
}

/* ══════════════════════════════════════════════
   BAR CHART (gasto por campanha)
══════════════════════════════════════════════ */
function renderBarChart() {
  const sorted=[...S.allInsights].sort((a,b)=>parseFloat(b.spend||0)-parseFloat(a.spend||0)).slice(0,8);
  if(!sorted.length) return '<div class="state"><div class="state-sub">Sem dados</div></div>';
  const max=parseFloat(sorted[0].spend||1);
  return `<div class="bars">${sorted.map(ins=>`
    <div class="bar-row">
      <span class="bar-lbl" title="${esc(ins.campaign_name)}">${esc(ins.campaign_name)}</span>
      <div class="bar-track"><div class="bar-fill" data-pct="${(parseFloat(ins.spend||0)/max*100).toFixed(1)}" style="width:0%"></div></div>
      <span class="bar-val">${fmtR(ins.spend)}</span>
    </div>`).join('')}</div>`;
}

function animateBars() {
  setTimeout(()=>{
    document.querySelectorAll('.bar-fill[data-pct]').forEach(el=>{el.style.width=el.dataset.pct+'%'});
  },80);
}

/* ══════════════════════════════════════════════
   CAMPAIGN TABLE
══════════════════════════════════════════════ */
function renderCampaignTable(compact=false) {
  const rows=S.allInsights.map(ins=>{
    const camp=S.campaigns.find(c=>c.id===ins.campaign_id)||{};
    return {...camp,ins};
  });

  const sorted=[...rows].sort((a,b)=>{
    let va,vb;
    if(S.sortCol==='results'){
      const ta=objType(a.objective||''), tb=objType(b.objective||'');
      va=getMainResult(a.ins||{},ta); vb=getMainResult(b.ins||{},tb);
    } else {
      va=parseFloat(a.ins?.[S.sortCol]||0); vb=parseFloat(b.ins?.[S.sortCol]||0);
    }
    return S.sortDir==='desc'?vb-va:va-vb;
  });

  const display=compact?sorted.slice(0,8):sorted;
  if(!display.length) return '<div class="state"><div class="state-icon">◌</div><div class="state-sub">Nenhuma campanha com dados no período</div></div>';

  const cols=[
    {key:'name',     label:'Campanha',   sort:false},
    {key:'obj',      label:'Objetivo',   sort:false},
    {key:'status',   label:'Status',     sort:false},
    {key:'spend',    label:'Gasto',      sort:true},
    {key:'impressions',label:'Impressões',sort:true},
    {key:'clicks',   label:'Cliques',    sort:true},
    {key:'ctr',      label:'CTR',        sort:true},
    {key:'cpc',      label:'CPC',        sort:true},
    {key:'results',  label:'Resultado',  sort:true},
    {key:'action',   label:'',           sort:false},
  ];

  const ths=cols.map(c=>`<th class="${S.sortCol===c.key?'sorted':''}" ${c.sort?`onclick="sortTable('${c.key}')"`:''}>${c.label}${c.sort?`<span class="sort-icon">${S.sortCol===c.key?(S.sortDir==='desc'?'↓':'↑'):'↕'}</span>`:''}</th>`).join('');

  const tds=display.map(row=>{
    const ins=row.ins||{};
    const prevIns=S.prevCampMap[row.id||ins.campaign_id]||{};
    const type=objType(row.objective||'');
    const name=ins.campaign_name||row.name||'—';
    const results=getMainResult(ins,type);
    const mainLabel=objMainLabel(type);
    const costLabel=objCostLabel(type);
    const cost=results>0?parseFloat(ins.spend||0)/results:0;
    const d=delta(parseFloat(ins.spend||0),parseFloat(prevIns.spend||0));
    const badge=d!==null?`<span class="delta ${Math.abs(d)<.5?'delta-flat':d>0?'delta-up':'delta-dn'}" style="font-size:9px;padding:1px 5px;margin-left:4px">${d>0?'+':''}${d.toFixed(1)}%</span>`:'';
    const objBadge=fmtObjBadge(row.objective||'');
    return `<tr>
      <td><div class="name-cell" title="${esc(name)}">${esc(name)}</div></td>
      <td>${objBadge?`<span class="obj-pill ${objPillClass(type)}">${objBadge}</span>`:'<span style="color:var(--t2)">—</span>'}</td>
      <td><span class="pill ${statusPill(row.status)}">${fmtStatus(row.status)}</span></td>
      <td class="mono">${fmtR(ins.spend)}${badge}</td>
      <td class="mono">${fmtN(ins.impressions)}</td>
      <td class="mono">${fmtN(ins.clicks)}</td>
      <td class="mono">${parseFloat(ins.ctr||0).toFixed(2)}%</td>
      <td class="mono">${fmtR(ins.cpc)}</td>
      <td class="mono">
        ${results>0
          ?`<strong>${fmtN(results)}</strong> <span style="font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px">${mainLabel}</span>${cost>0?`<span class="mono" style="font-size:10px;color:var(--t2);margin-left:4px">${costLabel}: ${fmtR(cost)}</span>`:''}`
          :'<span style="color:var(--t2)">—</span>'}
      </td>
      <td><button class="drill" onclick="drillCamp('${row.id||ins.campaign_id}','${esc(name).replace(/'/g,"\\'")}','${(row.objective||'').replace(/'/g,"\\'")}')">Ver criativos →</button></td>
    </tr>`;
  }).join('');

  return `<div class="table-wrap"><table><thead><tr>${ths}</tr></thead><tbody>${tds}</tbody></table></div>`;
}

/* ══════════════════════════════════════════════
   AD GRID
══════════════════════════════════════════════ */
function renderAdGrid() {
  const type=objType(S.selCampObj||'');
  const mainLabel=objMainLabel(type);

  const sorted=[...S.ads].sort((a,b)=>{
    const ra=getMainResult(S.adInsights[a.id]||{},type);
    const rb=getMainResult(S.adInsights[b.id]||{},type);
    if(rb!==ra) return rb-ra;
    return parseInt(S.adInsights[b.id]?.clicks||0)-parseInt(S.adInsights[a.id]?.clicks||0);
  });

  if(!sorted.length) return '<div class="state"><div class="state-icon">◌</div><div class="state-sub">Nenhum anúncio encontrado</div></div>';

  // Calcular mediana de CTR para badge
  const ctrs=sorted.map(ad=>parseFloat(S.adInsights[ad.id]?.ctr||0)).filter(v=>v>0);
  const medianCTR=ctrs.length?ctrs.sort((a,b)=>a-b)[Math.floor(ctrs.length/2)]:0;
  const maxResults=sorted.length>0?getMainResult(S.adInsights[sorted[0].id]||{},type):0;

  return `<div class="ad-grid">${sorted.map((ad,i)=>{
    const ins=S.adInsights[ad.id]||{};
    const results=getMainResult(ins,type);
    const ctr=parseFloat(ins.ctr||0);
    const spend=parseFloat(ins.spend||0);

    // Badge logic
    let badgeHtml='';
    if(i===0&&maxResults>0)  badgeHtml=`<div class="ad-badge champion">🏆 Campeão</div>`;
    else if(results>0&&ctr>medianCTR*1.3) badgeHtml=`<div class="ad-badge scale">↑ Escalar</div>`;
    else if(spend>0&&results===0)         badgeHtml=`<div class="ad-badge watch">⚠ Monitorar</div>`;
    else if(i<3)                          badgeHtml=`<div class="ad-badge rank">#${i+1}</div>`;

    // Thumbnail via background-image (bypassa adblocker)
    const thumbUrl=ad.creative?.image_url||ad.creative?.thumbnail_url||ad.creative?.object_story_spec?.video_data?.image_url||ad.creative?.object_story_spec?.link_data?.picture||null;
    const thumbHtml=thumbUrl
      ?`<div class="ad-thumb-bg" style="background-image:url('${thumbUrl}')"></div>`
      :`<div class="ad-thumb-empty">🎨<span>Sem preview</span></div>`;

    const cost=results>0?spend/results:0;

    return `<div class="ad-card" style="animation-delay:${i*.04}s">
      ${badgeHtml}
      <div class="ad-thumb">${thumbHtml}</div>
      <div class="ad-info">
        <div class="ad-name" title="${esc(ad.name)}">${esc(ad.name)}</div>
        <div class="ad-stats">
          <div class="ad-stat hi">
            <div class="ad-stat-l">${mainLabel}</div>
            <div class="ad-stat-v">${results>0?fmtN(results):'—'}</div>
          </div>
          <div class="ad-stat">
            <div class="ad-stat-l">Gasto</div>
            <div class="ad-stat-v">${fmtR(ins.spend)}</div>
          </div>
          <div class="ad-stat">
            <div class="ad-stat-l">${objCostLabel(type)}</div>
            <div class="ad-stat-v">${cost>0?fmtR(cost):'—'}</div>
          </div>
          <div class="ad-stat">
            <div class="ad-stat-l">CTR</div>
            <div class="ad-stat-v">${ctr.toFixed(2)}%</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
function drillCamp(id,name,objective) {
  S.selCamp=id; S.selCampName=name; S.selCampObj=objective;
  S.view='campaign-detail';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('nav-ads').classList.add('active');
  loadAds(id); updateBreadcrumb();
}

function sortTable(col) {
  S.sortDir=S.sortCol===col?(S.sortDir==='desc'?'asc':'desc'):'desc';
  S.sortCol=col; renderView();
}

function updateBreadcrumb() {
  const el=document.getElementById('breadcrumb');
  const lbl={overview:'Visão Geral',campaigns:'Campanhas',ads:'Criativos'};
  if(S.view==='campaign-detail') {
    el.innerHTML=`<span class="bc" onclick="setView('campaigns')">Campanhas</span><span class="bc-sep">›</span><span class="bc cur">${esc(S.selCampName||'')}</span>`;
  } else {
    el.innerHTML=`<span class="bc cur">${lbl[S.view]||''}</span>`;
  }
}

function updateLastUpdate() {
  document.getElementById('last-update').textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function showLoading() {
  document.getElementById('page').innerHTML='<div class="state"><div class="spinner"></div><div class="state-sub">Carregando...</div></div>';
}

function showSkeleton() {
  document.getElementById('page').innerHTML=`

      ${Array(6).fill('<div class="skel skel-kpi"></div>').join('')}

    <div class="skel skel-card" style="height:300px"></div>`;

function showError(msg) {

}
